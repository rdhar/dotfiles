%YAML 1.3
---
- Feature: THUMB WHEEL
- Rule:
  - Test: [thumb_wheel_up, 12]
  - KeyPress:
    - [Control_L, Tab]
    - click
- Rule:
  - Test: [thumb_wheel_down, 12]
  - KeyPress:
    - [Control_L, Shift_L, Tab]
    - click
...
---
- Rule:
  - MouseGesture: [Back Button, Mouse Up]
  - KeyPress:
    - XF86_AudioRaiseVolume
    - click
- Rule:
  - MouseGesture: [Back Button, Mouse Down]
  - KeyPress:
    - XF86_AudioLowerVolume
    - click
- Rule:
  - MouseGesture: Back Button
  - KeyPress:
    - Right
    - click
...
---
- Rule:
  - MouseGesture: [Forward Button, Mouse Left]
  - KeyPress:
    - XF86_Back
    - click
- Rule:
  - MouseGesture: [Forward Button, Mouse Right]
  - KeyPress:
    - XF86_Forward
    - click
- Rule:
  - MouseGesture: [Forward Button, Mouse Up]
  - KeyPress:
    - XF86_Paste
    - click
- Rule:
  - MouseGesture: [Forward Button, Mouse Down]
  - KeyPress:
    - XF86_Copy
    - click
- Rule:
  - MouseGesture: Forward Button
  - KeyPress:
    - Left
    - click
...
---
- Rule:
  - MouseGesture: [Mouse Gesture Button, Mouse Left]
  - KeyPress:
    - Undo
    - click
- Rule:
  - MouseGesture: Mouse Gesture Button
  - KeyPress:
    - Return
    - click
...
