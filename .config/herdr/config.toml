onboarding = false

[experimental]
pane_history = true

[keys]
prefix = "ctrl+a"

[session]
resume_agents_on_restore = true

[theme]
custom.accent = "#b8943a"
name = "terminal"

[ui]
agent_panel_sort = "spaces"
hide_tab_bar_when_single_tab = true
mouse_scroll_lines = 1
pane_gaps = true
show_agent_labels_on_pane_borders = false
sidebar_collapsed_mode = "hidden"

[ui.toast.clipboard]
enabled = false

[ui.toast.herdr]
position = "bottom-left"

[ui.sidebar.spaces]
row_gap = 1
rows = [
  ["state_icon", "workspace"],
  ["git_status", "branch"],
]

[ui.sidebar.agents]
row_gap = 1
rows = [
  ["state_icon", "workspace", "tab"],
  ["terminal_title_stripped"],
  [{ token = "agent", bold = true }, "state_text"],
]

[update]
channel = "stable"
manifest_check = true
version_check = true

[[keys.command]]
key = "prefix+t"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "open scratch terminal"
width = "80%"
height = "80%"

# https://github.com/rdhar/dotfiles/blob/main/.config/herdr/config.toml
